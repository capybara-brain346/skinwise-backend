<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkinWise</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f6f7f9;
            color: #111;
        }

        header {
            background: #0ea5e9;
            color: #fff;
            padding: 16px 24px;
        }

        main {
            max-width: 900px;
            margin: 24px auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        h1,
        h2 {
            margin: 0 0 12px;
        }

        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
        }

        .muted {
            color: #6b7280;
        }

        .btn {
            display: inline-block;
            background: #0ea5e9;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn.secondary {
            background: #111827;
        }

        input[type=file] {
            display: block;
            margin: 8px 0 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th,
        td {
            padding: 8px 10px;
            border-bottom: 1px solid #f0f2f5;
            text-align: left;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #e5f3fb;
            color: #0b83c5;
            font-size: 12px;
        }
    </style>
    {% block head %}{% endblock %}
    {% csrf_token %}
    <script>
        function previewFile(input, imgId) {
            const file = input.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = document.getElementById(imgId);
            if (img) img.src = url;
        }
    </script>
    {% block head_scripts %}{% endblock %}
</head>

<body>
    <header>
        <h1>SkinWise</h1>
        <div class="muted">Dermatology AI assistant</div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
